name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  verify-version:
    name: Verify Release Consistency
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Version.php and CHANGELOG match the tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CODE_VERSION=$(php -r "require 'src/Version.php'; echo \CanvasLMS\Version::VERSION;")
          if [ "$TAG" != "$CODE_VERSION" ]; then
            echo "::error::Tag v$TAG does not match Version::VERSION ($CODE_VERSION). Update src/Version.php before tagging."
            exit 1
          fi
          if ! grep -q "## \[$TAG\]" CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no entry for version $TAG."
            exit 1
          fi
          echo "Release consistency verified for v$TAG"

  quality:
    name: Quality Checks
    needs: verify-version
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2
        with:
          php-version: '8.1'
          extensions: mbstring, curl, json
          coverage: xdebug
          tools: composer:v2

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Run all quality checks
        run: composer check

      - name: Generate coverage report
        run: vendor/bin/phpunit tests --coverage-clover=coverage/clover.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./coverage/clover.xml

  notify-packagist:
    name: Update Packagist
    needs: quality
    runs-on: ubuntu-latest
    
    steps:
      - name: Notify Packagist
        env:
          PACKAGIST_USERNAME: ${{ secrets.PACKAGIST_USERNAME }}
          PACKAGIST_API_TOKEN: ${{ secrets.PACKAGIST_API_TOKEN }}
        run: |
          if [[ -n "$PACKAGIST_USERNAME" && -n "$PACKAGIST_API_TOKEN" ]]; then
            echo "Updating Packagist..."
            curl -XPOST -H'content-type:application/json' \
              "https://packagist.org/api/update-package?username=$PACKAGIST_USERNAME&apiToken=$PACKAGIST_API_TOKEN" \
              -d'{"repository":{"url":"https://github.com/jjuanrivvera/canvas-lms-kit"}}'
          else
            echo "::warning::Packagist webhook not configured. Please update Packagist manually."
            echo "::warning::Add PACKAGIST_USERNAME and PACKAGIST_API_TOKEN secrets in repository settings."
          fi